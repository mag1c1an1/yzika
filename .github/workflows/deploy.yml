name: Deploy to aliyun

on:
  push:
    branches: [main]
  workflow_dispatch:

# 让同时运行的部署串行,避免旧 push 覆盖新 push
concurrency:
  group: deploy-aliyun
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: signal -> target

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Build signal service
        run: cargo build --manifest-path signal/Cargo.toml --release

      - name: Prepare server directories
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 101.132.60.231
          port: 22
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            mkdir -p /etc/nginx/snippets
            mkdir -p /opt/technological-trappist/signal

      - name: Deploy nginx basic auth credentials
        uses: appleboy/ssh-action@v1.2.2
        env:
          STREAM_HTPASSWD: ${{ secrets.STREAM_HTPASSWD }}
        with:
          host: 101.132.60.231
          port: 22
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          envs: STREAM_HTPASSWD
          script: |
            set -e

            if [ -n "$STREAM_HTPASSWD" ]; then
              printf '%s\n' "$STREAM_HTPASSWD" > /etc/nginx/.htpasswd-stream
            fi

            if [ -f /etc/nginx/.htpasswd-stream ]; then
              chown root:root /etc/nginx/.htpasswd-stream

              if getent group www-data >/dev/null 2>&1; then
                chgrp www-data /etc/nginx/.htpasswd-stream
                chmod 640 /etc/nginx/.htpasswd-stream
              elif getent group nginx >/dev/null 2>&1; then
                chgrp nginx /etc/nginx/.htpasswd-stream
                chmod 640 /etc/nginx/.htpasswd-stream
              else
                chmod 644 /etc/nginx/.htpasswd-stream
              fi
            fi

      - name: Deploy nginx stream and signal snippet
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz
          path: ops/nginx/stream-auth.conf
          remote_path: /etc/nginx/snippets/
          remote_host: 101.132.60.231
          remote_port: "22"
          remote_user: root
          remote_key: ${{ secrets.DEPLOY_KEY }}

      - name: Deploy signal service unit
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz
          path: ops/systemd/technological-trappist-signal.service
          remote_path: /etc/systemd/system/
          remote_host: 101.132.60.231
          remote_port: "22"
          remote_user: root
          remote_key: ${{ secrets.DEPLOY_KEY }}

      - name: Deploy signal service binary
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz
          path: signal/target/release/signal
          remote_path: /opt/technological-trappist/signal/
          remote_host: 101.132.60.231
          remote_port: "22"
          remote_user: root
          remote_key: ${{ secrets.DEPLOY_KEY }}

      - name: Restart signal service
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 101.132.60.231
          port: 22
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            chmod +x /opt/technological-trappist/signal/signal
            systemctl daemon-reload
            systemctl enable technological-trappist-signal.service
            systemctl restart technological-trappist-signal.service
            systemctl is-active --quiet technological-trappist-signal.service
            curl -fsS http://127.0.0.1:3000/health

      - name: Test and reload nginx
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 101.132.60.231
          port: 22
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e

            if [ ! -f /etc/nginx/.htpasswd-stream ]; then
              echo "Missing /etc/nginx/.htpasswd-stream. Create it with htpasswd before deploying /stream/."
              exit 1
            fi

            if ! nginx -T 2>/dev/null | grep -q "/etc/nginx/snippets/stream-auth.conf"; then
              echo "nginx does not include /etc/nginx/snippets/stream-auth.conf inside the site server block."
              echo "Add: include /etc/nginx/snippets/stream-auth.conf;"
              exit 1
            fi

            nginx -t
            systemctl reload nginx

      - name: Deploy site to server via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: dist/
          remote_path: /var/www/mag1cian/
          remote_host: 101.132.60.231
          remote_port: "22"
          remote_user: root
          remote_key: ${{ secrets.DEPLOY_KEY }}
