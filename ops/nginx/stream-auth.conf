# Protect the static Astro admin streaming page.
# This file must be included inside the nginx `server { ... }` block that serves
# /var/www/mag1cian.

location = /stream {
    return 301 /stream/;
}

location ^~ /stream/ {
    auth_basic "Admin Only";
    auth_basic_user_file /etc/nginx/.htpasswd-stream;

    add_header X-Robots-Tag "noindex, nofollow" always;

    try_files $uri $uri/ =404;
}
