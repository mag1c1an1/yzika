# Protect the static Astro admin streaming page and proxy the WebRTC signaling service.
# This file must be included inside the nginx `server { ... }` block that serves
# /var/www/mag1cian.

location = /stream {
    return 301 /stream/;
}

location ^~ /stream/ {
    root /var/www/mag1cian;
    index index.html;

    auth_basic "Admin Only";
    auth_basic_user_file /etc/nginx/.htpasswd-stream;

    add_header X-Robots-Tag "noindex, nofollow" always;

    try_files $uri $uri/ =404;
}

# Admin-only signaling endpoint. The broadcaster uses this path so public clients
# cannot claim the reserved `broadcaster` peer id.
location = /signal-admin {
    return 301 /signal-admin/;
}

location ^~ /signal-admin/ {
    auth_basic "Admin Only";
    auth_basic_user_file /etc/nginx/.htpasswd-stream;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    proxy_pass http://127.0.0.1:3000/;
}

# Public viewer signaling endpoint. Viewers need this to connect from /live/.
location = /signal {
    return 301 /signal/;
}

location ^~ /signal/ {
    if ($arg_peerId = broadcaster) {
        return 403;
    }

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    proxy_pass http://127.0.0.1:3000/;
}
